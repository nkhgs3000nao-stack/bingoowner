<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダイズビンゴ｜司会者システム</title>
  <style>
    :root {
      --bg:     #1C0F0A;
      --orange: #E8501A;
      --red:    #BE2318;
      --cream:  #FFF5E8;
      --gold:   #C8920A;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      background-image: radial-gradient(ellipse at 50% 5%,
        rgba(232,80,26,.08) 0%, transparent 55%);
      display: flex;
      flex-direction: column;
      padding: 6px 12px 5px;
      gap: 4px;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Noto Sans JP', sans-serif;
      color: var(--cream);
    }
    header { flex-shrink: 0; text-align: center; line-height: 1; }
    .eyebrow { font-size: .58rem; letter-spacing: .38em; color: var(--gold); }
    h1 { font-size: clamp(1.4rem, 2.8vw, 2.2rem); font-weight: 900; letter-spacing: .06em; }
    .t-o { color: var(--orange); }
    .t-c { color: var(--cream); }
    .stage { flex: 1; min-height: 0; display: flex; gap: 12px; }
    .char-card {
      flex: 0 0 46%; max-width: none; min-height: 0;
      position: relative; display: flex; flex-direction: column;
      background: linear-gradient(170deg, #FFFBF4 55%, #FFE8CC 100%);
      border-radius: 16px; border: 2.5px solid rgba(232,80,26,.5);
      box-shadow: 0 0 30px rgba(232,80,26,.2), 0 8px 20px rgba(0,0,0,.55);
      overflow: visible;
    }
    .char-img {
      flex: 1; min-height: 0; width: 100%; height: 100%;
      object-fit: cover; object-position: center 8%;
      display: block; border-radius: 12px 12px 0 0;
    }
    .char-nameplate {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--orange), var(--red));
      text-align: center;
      padding: clamp(5px,1vh,9px) 10px;
      font-size: clamp(1.3rem, 2.2vw, 1.9rem);
      font-weight: 900; letter-spacing: .25em; color: white;
      border-radius: 0 0 12px 12px; text-shadow: 0 1px 3px rgba(0,0,0,.4);
    }
    .speech-bubble {
      position: absolute; top: -12px; left: 50%;
      transform: translateX(-50%) scale(0); transform-origin: bottom center;
      background: white; border: 2.5px solid #1A0804; border-radius: 14px;
      padding: 7px 14px; font-size: clamp(.85rem, 1.4vw, 1.1rem);
      font-weight: 800; color: #1A0804; white-space: nowrap;
      box-shadow: 3px 4px 0 rgba(0,0,0,.2); z-index: 30; animation-fill-mode: forwards;
    }
    .speech-bubble::before {
      content: ''; position: absolute; bottom: -16px; left: 50%;
      transform: translateX(-50%);
      border: 10px solid transparent; border-top-color: #1A0804; border-bottom: none;
    }
    .speech-bubble::after {
      content: ''; position: absolute; bottom: -12px; left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent; border-top-color: white; border-bottom: none;
    }
    @keyframes bubblePop {
      0%   { transform: translateX(-50%) scale(0);    opacity: 0; }
      70%  { transform: translateX(-50%) scale(1.08); opacity: 1; }
      100% { transform: translateX(-50%) scale(1);    opacity: 1; }
    }
    .speech-bubble.pop { animation: bubblePop .4s cubic-bezier(.2,.8,.3,1.2) forwards; }
    .bowl-section { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 4px; }
    .bowl-wrap {
      flex: 1; min-height: 0; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .bowl-svg { width: 100%; height: 100%; display: block; }
    #die1-g, #die2-g { transform-box: fill-box; transform-origin: center; }
    @keyframes rollAnim {
      0%   { transform: rotate(0deg)   scale(1);    }
      18%  { transform: rotate(112deg) scale(.76);  }
      42%  { transform: rotate(246deg) scale(1.14); }
      66%  { transform: rotate(340deg) scale(.92);  }
      86%  { transform: rotate(358deg) scale(1.04); }
      100% { transform: rotate(360deg) scale(1);    }
    }
    #die1-g.rolling, #die2-g.rolling { animation: rollAnim .72s ease-out; }
    .result-nums {
      flex-shrink: 0; text-align: center;
      font-size: clamp(2rem, 4.5vw, 4rem); font-weight: 900; line-height: 1;
      min-height: 3.6rem; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 2px;
      opacity: 0; transform: translateY(5px); transition: opacity .35s, transform .35s;
    }
    .result-nums.show { opacity: 1; transform: translateY(0); }
    .result-row { display: flex; align-items: center; }
    .result-nums .n   { color: var(--orange); }
    .result-nums .sep { color: rgba(255,245,232,.22); font-size: .8em; margin: 0 .2em; }
    .result-sub {
      font-size: clamp(.6rem, 1vw, .78rem); letter-spacing: .18em; color: var(--gold);
      opacity: 0; transition: opacity .3s .15s;
    }
    .result-sub.show    { opacity: 1; }
    .result-sub.doubles { color: #FFD060; font-weight: 700; }
    .controls-strip {
      flex-shrink: 0; display: flex; align-items: center;
      gap: 8px; justify-content: center; flex-wrap: nowrap;
    }
    .timer-mini {
      display: flex; align-items: center; gap: 5px;
      background: #050505; border: 2px solid #252525; border-radius: 6px;
      padding: 4px 10px; box-shadow: inset 0 0 14px rgba(0,0,0,.95), 0 0 8px rgba(255,42,0,.1);
      flex-shrink: 0;
    }
    .timer-icon { font-size: .78rem; opacity: .5; }
    .timer-num {
      font-family: 'Courier New', 'Lucida Console', monospace;
      font-size: clamp(1.0rem, 1.8vw, 1.55rem); font-weight: 900; color: #FF2A00;
      text-shadow: 0 0 5px #FF2A00, 0 0 12px rgba(255,42,0,.4);
      letter-spacing: .08em; min-width: 4.2ch; display: inline-block;
    }
    .timer-num.ended { color: #FF7700; text-shadow: 0 0 5px #FF7700; }
    @keyframes timerFlash { 0%,100% { opacity: 1; } 50% { opacity: .15; } }
    .timer-num.flash { animation: timerFlash .35s linear 4; }
    .roll-btn {
      background: linear-gradient(155deg, #E8501A, #BE2318); color: var(--cream);
      border: none; padding: 7px clamp(14px,2vw,22px);
      font-size: clamp(.85rem, 1.5vw, 1.1rem); font-weight: 800; letter-spacing: .1em;
      border-radius: 50px; cursor: pointer; font-family: inherit; white-space: nowrap;
      flex-shrink: 0; box-shadow: 0 3px 0 #7A1508, 0 5px 14px rgba(190,35,24,.35);
      transition: transform .1s, box-shadow .1s;
    }
    .roll-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 0 #7A1508, 0 8px 18px rgba(190,35,24,.45); }
    .roll-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: 0 1px 0 #7A1508; }
    .roll-btn:disabled { opacity: .45; cursor: not-allowed; }
    .chips { display: flex; flex-wrap: wrap; gap: 3px; max-width: 240px; }
    .chip {
      padding: 1px 7px; border-radius: 20px; font-size: .6rem;
      background: rgba(255,245,232,.05); color: rgba(255,245,232,.28);
      border: 1px solid rgba(255,245,232,.1); white-space: nowrap;
    }
    .chip.new { background: rgba(232,80,26,.14); color: var(--orange); border-color: rgba(232,80,26,.35); }
    @media (prefers-reduced-motion: reduce) {
      #die1-g.rolling, #die2-g.rolling { animation: none; }
      .result-nums { transition: none; }
      .speech-bubble.pop { animation: none; transform: translateX(-50%) scale(1); opacity: 1; }
      .timer-num.flash { animation: none; }
    }
  </style>
</head>
<body>

<header>
  <p class="eyebrow">主催者コントロールパネル</p>
  <h1><span class="t-o">ダイズ</span><span class="t-c">ビンゴ</span></h1>
</header>

<div class="stage">
  <div class="char-card">
    <div class="speech-bubble" id="bubble"></div>
    <!-- ★ 同じフォルダにある character.png を参照 -->
    <img class="char-img" src="character.png" alt="司会者">
    <div class="char-nameplate">🎤 司会者</div>
  </div>

  <div class="bowl-section">
    <div class="bowl-wrap">
      <svg class="bowl-svg" viewBox="0 0 440 390" xmlns="http://www.w3.org/2000/svg" id="mainSvg">
        <defs>
          <filter id="dieShad" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="rgba(0,0,0,0.7)"/>
          </filter>
          <radialGradient id="rimGrad" cx="50%" cy="68%" r="52%" gradientUnits="objectBoundingBox">
            <stop offset="0%"   stop-color="#C06030"/>
            <stop offset="52%"  stop-color="#8B3520"/>
            <stop offset="100%" stop-color="#4A1A08"/>
          </radialGradient>
          <radialGradient id="intGrad" cx="50%" cy="50%" r="50%" gradientUnits="objectBoundingBox">
            <stop offset="0%"   stop-color="#3D1508"/>
            <stop offset="100%" stop-color="#1A0604"/>
          </radialGradient>
        </defs>
        <ellipse cx="220" cy="207" rx="207" ry="196" fill="rgba(0,0,0,0.44)"/>
        <ellipse cx="220" cy="197" rx="203" ry="192" fill="#4A1A08"/>
        <ellipse cx="220" cy="197" rx="202" ry="191" fill="url(#rimGrad)"/>
        <ellipse cx="220" cy="197" rx="188" ry="178" fill="#280C06"/>
        <ellipse cx="220" cy="197" rx="183" ry="173" fill="url(#intGrad)"/>
        <ellipse cx="220" cy="197" rx="145" ry="136" fill="none" stroke="#1A0604" stroke-width="3" opacity=".55"/>
        <ellipse cx="220" cy="197" rx="100" ry="92"  fill="none" stroke="#1A0604" stroke-width="2" opacity=".38"/>
        <ellipse cx="220" cy="315" rx="115" ry="24"  fill="rgba(160,72,20,.13)"/>
        <g id="die1-g">
          <rect x="82" y="137" width="130" height="130" rx="18" fill="#FFFDF8" filter="url(#dieShad)"/>
          <rect x="83" y="137" width="128" height="7"   rx="16" fill="rgba(255,255,255,0.88)"/>
          <g id="die1-pips"></g>
        </g>
        <g id="die2-g">
          <rect x="228" y="137" width="130" height="130" rx="18" fill="#FFFDF8" filter="url(#dieShad)"/>
          <rect x="229" y="137" width="128" height="7"   rx="16" fill="rgba(255,255,255,0.88)"/>
          <g id="die2-pips"></g>
        </g>
        <path d="M 66,232 Q 220,265 374,232" stroke="#C4773A" stroke-width="2.5" fill="none" opacity=".30"/>
        <path d="M 80,162 Q 220,148 360,162" stroke="#C4773A" stroke-width="1.5" fill="none" opacity=".20"/>
      </svg>
    </div>

    <div class="result-nums" id="resultNums">
      <div class="result-row">
        <span class="n" id="n1"></span>
        <span class="sep">＋</span>
        <span class="n" id="n2"></span>
      </div>
      <div class="result-sub" id="resultSub"></div>
    </div>

    <div class="controls-strip">
      <div class="timer-mini">
        <span class="timer-icon">⏱</span>
        <span class="timer-num" id="timerDisplay">00:07</span>
      </div>
      <button class="roll-btn" id="rollBtn" onclick="rollDice()">🎲 サイコロを振る</button>
      <div class="chips" id="chips"></div>
    </div>
  </div>
</div>

<script>
  const SVG_NS = 'http://www.w3.org/2000/svg';
  const PIPS = {
    1:[4], 2:[2,6], 3:[2,4,6], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,3,6,2,5,8]
  };
  function pipPos(ox,oy){
    const o=[17,50,83],pts=[];
    for(let r=0;r<3;r++) for(let c=0;c<3;c++) pts.push([ox+o[c],oy+o[r]]);
    return pts;
  }
  function renderPips(gId,ox,oy,val){
    const g=document.getElementById(gId); g.innerHTML='';
    const pos=pipPos(ox,oy);
    (PIPS[val]||[]).forEach(i=>{
      const c=document.createElementNS(SVG_NS,'circle');
      c.setAttribute('cx',pos[i][0]); c.setAttribute('cy',pos[i][1]);
      c.setAttribute('r','11'); c.setAttribute('fill','#1A0804'); g.appendChild(c);
      const h=document.createElementNS(SVG_NS,'circle');
      h.setAttribute('cx',pos[i][0]-2.5); h.setAttribute('cy',pos[i][1]-3);
      h.setAttribute('r','4'); h.setAttribute('fill','rgba(255,255,255,0.18)'); g.appendChild(h);
    });
  }
  const COMMENTS=[
    'なんやてぇぇぇぇぇぇ',
    'これいけるで！！！',
    'たのむでぇぇぇぇぇ',
    'せやなぁぁぁぁ',
    '出身は神戸市北区有野やねん',
    'こらあかんわ。。。',
    'バハマイヤー来るでぇぇぇ',
    '茎わかめ食べる？？？',
    '腹へったなぁぁぁぁ',
    'どやさどやさどやさ'
  ];
  let timerInterval=null, timerRemaining=7;
  function updateTimerDisplay(){
    const el=document.getElementById('timerDisplay');
    const m=Math.floor(timerRemaining/60), s=timerRemaining%60;
    el.textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    el.classList.toggle('ended',timerRemaining<=0);
  }
  function startTimer(){
    clearInterval(timerInterval); timerRemaining=7;
    const el=document.getElementById('timerDisplay');
    el.classList.remove('ended','flash'); updateTimerDisplay();
    timerInterval=setInterval(()=>{
      timerRemaining--;
      updateTimerDisplay();
      if(timerRemaining<=0){
        clearInterval(timerInterval);
        el.classList.add('flash');
        setTimeout(()=>{ el.classList.remove('flash'); timerRemaining=7; updateTimerDisplay(); },1600);
      }
    },1000);
  }
  renderPips('die1-pips',82,137,1);
  renderPips('die2-pips',228,137,1);
  let rolling=false, hist=[], lastCmtIdx=-1;
  function rand6(){ return Math.ceil(Math.random()*6); }
  function showBubble(text){
    const b=document.getElementById('bubble');
    b.textContent=text; b.classList.remove('pop'); void b.offsetWidth; b.classList.add('pop');
  }
  function pickComment(){
    let idx;
    do{ idx=Math.floor(Math.random()*COMMENTS.length); }
    while(idx===lastCmtIdx && COMMENTS.length>1);
    lastCmtIdx=idx; return COMMENTS[idx];
  }
  function rollDice(){
    if(rolling) return;
    rolling=true; document.getElementById('rollBtn').disabled=true;
    startTimer();
    document.getElementById('resultNums').classList.remove('show');
    document.getElementById('resultSub').classList.remove('show','doubles');
    showBubble(pickComment());
    const d1=document.getElementById('die1-g'), d2=document.getElementById('die2-g');
    d1.classList.remove('rolling'); d2.classList.remove('rolling');
    void d1.offsetWidth; void d2.offsetWidth;
    d1.classList.add('rolling'); d2.classList.add('rolling');
    let t=0;
    const ticker=setInterval(()=>{
      renderPips('die1-pips',82,137,rand6());
      renderPips('die2-pips',228,137,rand6());
      if(++t>=9) clearInterval(ticker);
    },72);
    setTimeout(()=>{
      clearInterval(ticker);
      const v1=rand6(),v2=rand6();
      d1.classList.remove('rolling'); d2.classList.remove('rolling');
      renderPips('die1-pips',82,137,v1); renderPips('die2-pips',228,137,v2);
      document.getElementById('n1').textContent=v1;
      document.getElementById('n2').textContent=v2;
      document.getElementById('resultNums').classList.add('show');
      const sum=v1+v2;
      const sub=document.getElementById('resultSub');
      if(v1===v2){ sub.textContent='🎉 ゾロ目！　合計 '+sum; sub.classList.add('show','doubles'); }
      else        { sub.textContent='合計　'+sum; sub.classList.add('show'); }
      hist.unshift({v1,v2,sum}); if(hist.length>8) hist.pop();
      const c=document.getElementById('chips'); c.innerHTML='';
      hist.forEach((h,i)=>{
        const d=document.createElement('div');
        d.className=i===0?'chip new':'chip';
        d.textContent=h.v1+'・'+h.v2+'('+h.sum+')'; c.appendChild(d);
      });
      rolling=false; document.getElementById('rollBtn').disabled=false;
    },760);
  }
  document.addEventListener('keydown',e=>{
    if((e.code==='Space'||e.code==='Enter')&&document.activeElement!==document.getElementById('rollBtn')){
      e.preventDefault(); rollDice();
    }
  });
</script>
</body>
</html>
